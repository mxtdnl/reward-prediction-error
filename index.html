<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reward-Prediction-Error Visualiser — Habits Suite</title>
<meta name="description" content="Watch the dopamine reward-prediction-error signal migrate from reward to predictive cue across learning. Schultz, Dayan & Montague (1997), rendered interactively.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Public+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  /* surfaces */
  --paper:#F5F1E8; --surface:#FBF9F3; --ink:#16130F; --ink-muted:#6B6355;
  --rule:#DED7C7; --rule-soft:#EBE6DA;
  /* semantic accents */
  --signal:#E4572E; --cue:#2E6F8E; --gain:#3A7D44; --loss:#B23A48; --amber:#D69A2D;
  --focus:#2E6F8E;

  --font-display:"Fraunces",Georgia,"Times New Roman",serif;
  --font-body:"Public Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;

  --fs-caption:0.75rem; --fs-body:1rem; --fs-lead:1.25rem;
  --fs-h3:1.563rem; --fs-h2:1.953rem; --fs-h1:2.441rem; --fs-hero:3.815rem;

  --s1:8px; --s2:16px; --s3:24px; --s4:32px; --s5:48px; --s6:64px;

  --lw:1;        /* line-weight multiplier for canvas */
  --motion:1;    /* motion multiplier */
}

/* Dark projection variant */
body.project{
  --paper:#16130F; --surface:#1E1A15; --ink:#F5F1E8; --ink-muted:#B8AF9E;
  --rule:#3A342B; --rule-soft:#2A251E;
  --focus:#2E6F8E;
  --lw:1.6; --motion:1.3;
  font-size:23px;
}

html{font-size:17px}
body{
  background:var(--paper); color:var(--ink);
  font-family:var(--font-body); line-height:1.55;
  -webkit-font-smoothing:antialiased; min-height:100vh;
  transition:background .3s cubic-bezier(.4,0,.2,1), color .3s cubic-bezier(.4,0,.2,1);
}

/* ---------- top bar ---------- */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:var(--s3) var(--s5); border-bottom:1px solid var(--rule);
  gap:var(--s3); flex-wrap:wrap;
}
.brand{font-family:var(--font-body); font-weight:600; letter-spacing:.01em; font-size:var(--fs-body)}
.brand .eyebrow{
  display:block; font-family:var(--font-mono); font-weight:400;
  font-size:.66rem; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink-muted); margin-bottom:2px;
}
.brand strong{font-family:var(--font-display); font-weight:600}

.modetoggle{display:inline-flex; border:1px solid var(--rule); border-radius:6px; overflow:hidden}
.modetoggle button{
  font:500 .8rem/1 var(--font-body); padding:9px 14px; background:transparent;
  color:var(--ink-muted); border:none; cursor:pointer; letter-spacing:.02em;
  transition:background .2s ease, color .2s ease; white-space:nowrap;
}
.modetoggle button.on{background:var(--ink); color:var(--paper)}
.modetoggle button:focus-visible{outline:2px solid var(--focus); outline-offset:2px}

/* ---------- instrument layout ---------- */
.instrument{
  display:grid; grid-template-columns:1fr 360px; gap:var(--s4);
  padding:var(--s4) var(--s5); max-width:1440px; margin:0 auto; align-items:start;
}
.viz{display:flex; flex-direction:column; gap:var(--s2); min-width:0}

.canvas-wrap{
  position:relative; width:100%; height:460px;
  background:var(--surface); border:1px solid var(--rule); border-radius:8px;
  box-shadow:0 1px 2px rgba(22,19,15,.04), 0 8px 24px rgba(22,19,15,.05);
}
body.project .canvas-wrap{box-shadow:none}
.canvas-wrap canvas{display:block; width:100%; height:100%}
.canvas-wrap.small{height:120px; box-shadow:none}

.caption{
  font-family:var(--font-body); font-size:var(--fs-lead); line-height:1.4;
  color:var(--ink); min-height:2.8em; padding:0 var(--s1);
  transition:opacity .3s ease;
}
.caption b{font-weight:600; color:var(--signal)}
.caption .cueword{color:var(--cue); font-weight:600}
.caption .lossword{color:var(--loss); font-weight:600}

/* ---------- right rail ---------- */
.rail{display:flex; flex-direction:column; gap:var(--s3)}
.counter{display:flex; flex-direction:column; gap:2px}
.counter .lbl{
  font-family:var(--font-mono); font-size:var(--fs-caption); letter-spacing:.12em;
  text-transform:uppercase; color:var(--ink-muted);
}
.counter .hero{
  font-family:var(--font-mono); font-weight:500; font-size:var(--fs-hero); line-height:1;
  color:var(--ink); font-variant-numeric:tabular-nums;
}

.rail-chart{display:flex; flex-direction:column; gap:var(--s1)}
.rail-chart-lbl{
  font-family:var(--font-mono); font-size:var(--fs-caption); color:var(--ink-muted);
  display:flex; justify-content:space-between; align-items:baseline;
}
.rail-chart-lbl span{color:var(--cue); font-variant-numeric:tabular-nums; font-weight:500}

.controls{display:flex; flex-direction:column; gap:var(--s3)}

/* segmented control */
.seg{display:inline-flex; border:1px solid var(--rule); border-radius:6px; overflow:hidden; width:100%}
.seg button{
  flex:1; font:500 .82rem/1 var(--font-body); padding:11px 8px; background:transparent;
  color:var(--ink-muted); border:none; border-right:1px solid var(--rule); cursor:pointer;
  transition:background .2s ease, color .2s ease; white-space:nowrap;
}
.seg button:last-child{border-right:none}
.seg button.on{background:var(--ink); color:var(--paper)}
.seg button:focus-visible{outline:2px solid var(--focus); outline-offset:-2px; position:relative; z-index:1}

.btn-row{display:flex; gap:var(--s1); flex-wrap:wrap}
.btn--full{width:100%; flex:none}
.btn{
  font:600 var(--fs-body)/1 var(--font-body); padding:12px 18px; border-radius:6px;
  border:1px solid var(--ink); background:var(--ink); color:var(--paper); cursor:pointer;
  transition:transform .12s ease, background .2s ease, opacity .2s ease; flex:1; min-width:0;
  white-space:nowrap;
}
.btn:hover{background:#000}
body.project .btn:hover{background:var(--surface)}
.btn:active{transform:translateY(1px)}
.btn--signal{background:var(--signal); border-color:var(--signal); color:#fff}
.btn--signal:hover{background:#d64a22}
.btn--ghost{background:transparent; color:var(--ink); border-color:var(--rule)}
.btn--ghost:hover{background:var(--rule-soft)}
.btn:focus-visible{outline:2px solid var(--focus); outline-offset:2px}
.btn[aria-pressed="true"]{background:var(--signal); border-color:var(--signal); color:#fff}
.btn[disabled]{opacity:.4; cursor:not-allowed; pointer-events:none}

/* slider */
.slider{display:flex; flex-direction:column; gap:var(--s1)}
.slider label{
  font:500 var(--fs-body)/1.2 var(--font-body); color:var(--ink);
  display:flex; justify-content:space-between; align-items:baseline;
}
.slider label .mono{font-family:var(--font-mono); color:var(--cue); font-variant-numeric:tabular-nums; font-weight:500}
.descriptor{
  display:flex; justify-content:space-between;
  font-family:var(--font-mono); font-size:var(--fs-caption); color:var(--ink-muted);
}
input[type=range]{
  -webkit-appearance:none; appearance:none; width:100%; height:4px;
  background:var(--rule); border-radius:2px; cursor:pointer; margin:6px 0;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; appearance:none; width:20px; height:20px; border-radius:50%;
  background:var(--surface); border:2px solid var(--ink); cursor:pointer;
  box-shadow:0 1px 3px rgba(0,0,0,.15); transition:transform .1s ease;
}
input[type=range]:active::-webkit-slider-thumb{transform:scale(1.15)}
input[type=range]::-moz-range-track{height:4px; background:var(--rule); border-radius:2px}
input[type=range]::-moz-range-thumb{
  width:18px; height:18px; border-radius:50%; background:var(--surface);
  border:2px solid var(--ink); cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.15);
}
input[type=range]:focus-visible{outline:2px solid var(--focus); outline-offset:4px}

/* advanced switch */
.switch{
  display:flex; align-items:center; gap:10px; font:400 var(--fs-caption)/1.3 var(--font-body);
  color:var(--ink-muted); cursor:pointer; padding-top:2px;
}
.switch input{width:16px; height:16px; accent-color:var(--signal); cursor:pointer}
.switch:focus-within{outline:none}
.switch input:focus-visible{outline:2px solid var(--focus); outline-offset:2px}

.rail-note{font-size:var(--fs-caption); color:var(--ink-muted); line-height:1.4}
.rail-note a{color:var(--cue)}

/* responsive */
@media (max-width:820px){
  .instrument{grid-template-columns:1fr}
  .rail{order:2}
  .viz{order:1}
  .canvas-wrap{height:380px}
  .topbar{padding:var(--s2) var(--s3)}
  .instrument{padding:var(--s3)}
}

@media (prefers-reduced-motion:reduce){
  *{transition-duration:.001ms !important}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="eyebrow">Habits Suite · 01</span>
    <strong>Reward-Prediction-Error</strong> Visualiser
  </div>
  <div class="modetoggle" role="group" aria-label="Delivery mode">
    <button data-mode="solo" id="mSolo">● Solo</button>
    <button data-mode="project" id="mProj">▣ Project</button>
  </div>
</header>

<main class="instrument">
  <section class="viz">
    <div class="canvas-wrap">
      <canvas id="scope" role="img"
        aria-label="Two stacked oscilloscope panels. Top: trial structure with a cue light and a reward drop on a time axis. Bottom: the dopamine firing trace, showing spikes at cue-time and reward-time whose heights track the reward-prediction error.">
      </canvas>
    </div>
    <p class="caption" id="caption" aria-live="polite"></p>
  </section>

  <aside class="rail">
    <div class="counter">
      <span class="lbl">Trial</span>
      <span class="hero" id="trialCount">0</span>
    </div>

    <div class="rail-chart">
      <div class="rail-chart-lbl">Cue value&nbsp;V (predicted reward) <span id="vVal">0.00</span></div>
      <div class="canvas-wrap small">
        <canvas id="curve" role="img" aria-label="Learning curve of the cue's predicted reward value V, rising across trials toward the reward magnitude."></canvas>
      </div>
    </div>

    <div class="controls">
      <div class="seg" role="group" aria-label="Condition">
        <button data-cond="learning" class="on" aria-pressed="true">Learning</button>
        <button data-cond="learned" aria-pressed="false">Learned</button>
        <button data-cond="omission" aria-pressed="false">Omission</button>
      </div>

      <button class="btn btn--full" id="run1">Run 1 trial</button>
      <div class="btn-row">
        <button class="btn btn--ghost" id="auto" aria-pressed="false">▶ Auto-run</button>
        <button class="btn btn--ghost" id="reset">Reset</button>
      </div>

      <div class="slider">
        <label for="alpha">Learning rate&nbsp;α <span class="mono" id="alphaVal">0.30</span></label>
        <input type="range" id="alpha" min="0.05" max="0.6" step="0.01" value="0.3"
          aria-describedby="alphaDesc">
        <div class="descriptor" id="alphaDesc"><span>slow&nbsp;·&nbsp;0.05</span><span>0.60&nbsp;·&nbsp;fast</span></div>
      </div>

      <button class="btn btn--signal" id="schultz">▸ Reproduce Schultz's figure</button>

      <label class="switch">
        <input type="checkbox" id="tdmode"> Show full TD trace (advanced) — error propagates back bin-by-bin
      </label>

      <p class="rail-note">
        δ = actual − predicted. The dopamine signal <em>migrates</em> from reward to cue as the
        cue becomes predictive.<br>Schultz, Dayan &amp; Montague (1997), <em>Science</em>.
      </p>
    </div>
  </aside>
</main>

<script>
(function(){
"use strict";

/* ============================================================= *
 *  Config & state
 * ============================================================= */
const R = 1.0;                 // reward magnitude
const ASYMPTOTE_TRIALS = 20;   // trials to "Learned" jump / Schultz run
const N_BINS = 14;             // TD-trace mode: bins between cue and reward
const GAMMA = 0.96;            // TD discount
const CUE_BIN = 0, REWARD_BIN = N_BINS - 1;

const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const state = {
  mode: 'project',
  alpha: 0.3,
  condition: 'learning',      // learning | learned | omission
  trial: 0,
  V: 0,                       // two-timepoint cue value
  history: [0],               // V over trials, for learning curve
  // displayed (animated) deltas for the two-timepoint trace
  dispCue: 0, dispReward: 0,
  targetCue: 0, targetReward: 0,
  omittedThisTrial: false,
  // TD-trace mode
  tdMode: false,
  W: new Array(N_BINS).fill(0),
  dispDeltas: new Array(N_BINS).fill(0),
  targetDeltas: new Array(N_BINS).fill(0),
  // animation
  anim: null,                 // {t0, dur, from:{}, to:{}, pulses}
  autorun: false,
  autorunTimer: null,
  guided: false,              // Schultz sequence running
};

/* ============================================================= *
 *  DOM
 * ============================================================= */
const scope = document.getElementById('scope');
const curve = document.getElementById('curve');
const sctx = scope.getContext('2d');
const cctx = curve.getContext('2d');
const el = {
  caption: document.getElementById('caption'),
  trialCount: document.getElementById('trialCount'),
  vVal: document.getElementById('vVal'),
  alpha: document.getElementById('alpha'),
  alphaVal: document.getElementById('alphaVal'),
  run1: document.getElementById('run1'),
  auto: document.getElementById('auto'),
  reset: document.getElementById('reset'),
  schultz: document.getElementById('schultz'),
  tdmode: document.getElementById('tdmode'),
  segBtns: Array.from(document.querySelectorAll('.seg button')),
  modeBtns: Array.from(document.querySelectorAll('.modetoggle button')),
};

/* ============================================================= *
 *  Colour helpers (read live CSS vars so they adapt to mode)
 * ============================================================= */
function css(name){ return getComputedStyle(document.body).getPropertyValue(name).trim(); }
const COL = {};
function refreshColours(){
  COL.ink      = css('--ink');
  COL.inkMuted = css('--ink-muted');
  COL.surface  = css('--surface');
  COL.rule     = css('--rule');
  COL.ruleSoft = css('--rule-soft');
  COL.signal   = css('--signal');
  COL.cue      = css('--cue');
  COL.gain     = css('--gain');
  COL.loss     = css('--loss');
  COL.amber    = css('--amber');
  COL.lw       = parseFloat(css('--lw')) || 1;
}

/* ============================================================= *
 *  HiDPI canvas sizing
 * ============================================================= */
function sizeCanvas(cv, ctx){
  const dpr = window.devicePixelRatio || 1;
  const rect = cv.getBoundingClientRect();
  const cssW = Math.max(1, rect.width), cssH = Math.max(1, rect.height);
  cv.width = Math.round(cssW * dpr);
  cv.height = Math.round(cssH * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { w: cssW, h: cssH };
}

/* ============================================================= *
 *  Math helpers
 * ============================================================= */
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const lerp = (a,b,t)=>a+(b-a)*t;
function easeInOut(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }
function bump(p,c,w){ const d=(p-c)/w; return Math.exp(-d*d); }
function motionDur(ms){ return reducedMotion ? 0 : ms * (parseFloat(css('--motion'))||1); }

/* ============================================================= *
 *  MODEL — two-timepoint
 * ============================================================= */
function runTrialTwoTimepoint(){
  const omit = state.condition === 'omission';
  const rEff = omit ? 0 : R;
  const dCue = state.V;                 // phasic response to cue = current predicted value
  const dReward = rEff - state.V;       // surprise remaining at reward (negative => dip)
  state.V = state.V + state.alpha * (rEff - state.V);   // Rescorla–Wagner update
  state.omittedThisTrial = omit;
  state.trial += 1;
  state.history.push(state.V);
  animateTo({ cue: dCue, reward: dReward });
}

/* MODEL — TD(0) across time bins (advanced trace) */
function runTrialTD(){
  const omit = state.condition === 'omission';
  const rewardVal = omit ? 0 : R;
  const deltas = new Array(N_BINS).fill(0);
  for(let t=0;t<N_BINS;t++){
    const rt = (t === REWARD_BIN) ? rewardVal : 0;
    const vNext = (t < N_BINS-1) ? state.W[t+1] : 0;
    const d = rt + GAMMA*vNext - state.W[t];
    state.W[t] += state.alpha * d;
    deltas[t] = d;
  }
  state.omittedThisTrial = omit;
  state.trial += 1;
  state.V = state.W[CUE_BIN];            // cue value tracked for the learning curve
  state.history.push(state.V);
  animateDeltasTo(deltas);
}

function runTrial(){
  if(state.tdMode) runTrialTD(); else runTrialTwoTimepoint();
}

/* Jump to the fully-learned asymptote (segmented "Learned") */
function snapToLearned(){
  if(state.tdMode){
    // run many silent TD trials to converge, then show
    const prev = state.dispDeltas.slice();
    for(let i=0;i<ASYMPTOTE_TRIALS*4;i++){
      for(let t=0;t<N_BINS;t++){
        const rt = (t===REWARD_BIN)?R:0;
        const vNext = (t<N_BINS-1)?state.W[t+1]:0;
        state.W[t] += state.alpha*(rt+GAMMA*vNext-state.W[t]);
      }
    }
    state.trial += ASYMPTOTE_TRIALS;
    state.V = state.W[CUE_BIN];
    state.history.push(state.V);
    // learned steady-state deltas
    const deltas = new Array(N_BINS).fill(0);
    for(let t=0;t<N_BINS;t++){
      const rt=(t===REWARD_BIN)?R:0;
      const vNext=(t<N_BINS-1)?state.W[t+1]:0;
      deltas[t]=rt+GAMMA*vNext-state.W[t];
    }
    animateDeltasTo(deltas);
  } else {
    state.V = R;
    state.trial += ASYMPTOTE_TRIALS;
    state.history.push(state.V);
    animateTo({ cue: R, reward: 0 });
  }
}

/* ============================================================= *
 *  Animation driver
 * ============================================================= */
function animateTo(target){
  state.targetCue = target.cue;
  state.targetReward = target.reward;
  const dur = motionDur(400);
  state.anim = {
    t0: performance.now(), dur, kind:'two',
    from: { cue: state.dispCue, reward: state.dispReward },
    to: { cue: target.cue, reward: target.reward },
  };
  if(dur === 0){ state.dispCue = target.cue; state.dispReward = target.reward; }
  startLoop();
  syncReadouts();
}

function animateDeltasTo(deltas){
  state.targetDeltas = deltas.slice();
  const dur = motionDur(400);
  state.anim = {
    t0: performance.now(), dur, kind:'td',
    from: state.dispDeltas.slice(),
    to: deltas.slice(),
  };
  if(dur === 0){ state.dispDeltas = deltas.slice(); }
  startLoop();
  syncReadouts();
}

let looping = false;
function startLoop(){ if(!looping){ looping = true; requestAnimationFrame(tick); } }

function tick(now){
  let active = false;
  const a = state.anim;
  let pulseCue = 0, pulseReward = 0;
  if(a){
    const p = a.dur > 0 ? clamp((now - a.t0)/a.dur, 0, 1) : 1;
    const e = easeInOut(p);
    if(a.kind === 'two'){
      state.dispCue = lerp(a.from.cue, a.to.cue, e);
      state.dispReward = lerp(a.from.reward, a.to.reward, e);
    } else {
      for(let i=0;i<N_BINS;i++) state.dispDeltas[i] = lerp(a.from[i], a.to[i], e);
    }
    // event pulses for the top panel marks
    pulseCue = bump(p, 0.20, 0.16);
    pulseReward = bump(p, 0.62, 0.18);
    if(p < 1){ active = true; } else { state.anim = null; }
  }
  drawScope(pulseCue, pulseReward);
  if(active){ requestAnimationFrame(tick); } else { looping = false; drawScope(0,0); }
}

/* ============================================================= *
 *  DRAW — main scope
 * ============================================================= */
function drawScope(pulseCue, pulseReward){
  const { w, h } = sizeCanvas(scope, sctx);
  sctx.clearRect(0,0,w,h);
  const lw = COL.lw;

  // geometry
  const padL = 58, padR = 40, padT = 20, padB = 34;
  const plotW = w - padL - padR;
  const cueX = padL + plotW * 0.28;
  const rewardX = padL + plotW * 0.74;

  const topH = (h - padT - padB) * 0.42;
  const gap = 18;
  const y0Top = padT;
  const y1Top = padT + topH;
  const y0Bot = y1Top + gap;
  const y1Bot = h - padB;

  // panel divider
  sctx.strokeStyle = COL.rule; sctx.lineWidth = 1;
  sctx.beginPath(); sctx.moveTo(padL, y1Top + gap/2); sctx.lineTo(w-padR, y1Top + gap/2); sctx.stroke();

  // --- time-axis vertical guides at cue & reward ---
  sctx.strokeStyle = COL.ruleSoft; sctx.lineWidth = 1;
  [cueX, rewardX].forEach(x=>{
    sctx.beginPath(); sctx.setLineDash([2,4]); sctx.moveTo(x, y0Top); sctx.lineTo(x, y1Bot); sctx.stroke(); sctx.setLineDash([]);
  });

  // panel labels (mono, muted)
  sctx.font = `500 11px ${'"JetBrains Mono", monospace'}`;
  sctx.fillStyle = COL.inkMuted; sctx.textAlign = 'left'; sctx.textBaseline = 'alphabetic';
  sctx.fillText('TRIAL STRUCTURE', padL, y0Top - 6 + 14);
  sctx.fillText('DOPAMINE RESPONSE  δ', padL, y0Bot - 6 + 14);

  /* ---------- TOP PANEL: cue light + reward drop ---------- */
  const midTop = (y0Top + 14 + y1Top) / 2 + 6;

  // cue light (filled circle, --cue) with pulse
  const cueR = (7 + 5*pulseCue) * (state.mode==='project'?1.25:1);
  sctx.save();
  if(pulseCue > 0.05){
    sctx.shadowColor = COL.cue; sctx.shadowBlur = 22*pulseCue;
  }
  sctx.fillStyle = COL.cue; sctx.globalAlpha = 0.55 + 0.45*pulseCue;
  sctx.beginPath(); sctx.arc(cueX, midTop, cueR, 0, Math.PI*2); sctx.fill();
  sctx.restore();

  // reward mark: droplet (learning/learned) or dashed empty ring (omission)
  const rewardPulseR = (8 + 5*pulseReward) * (state.mode==='project'?1.25:1);
  if(state.omittedThisTrial){
    sctx.strokeStyle = COL.loss; sctx.lineWidth = 2*lw; sctx.globalAlpha = 0.6 + 0.4*pulseReward;
    sctx.setLineDash([3,3]);
    sctx.beginPath(); sctx.arc(rewardX, midTop, rewardPulseR, 0, Math.PI*2); sctx.stroke();
    sctx.setLineDash([]); sctx.globalAlpha = 1;
  } else {
    sctx.save();
    if(pulseReward > 0.05){ sctx.shadowColor = COL.signal; sctx.shadowBlur = 22*pulseReward; }
    sctx.fillStyle = COL.signal; sctx.globalAlpha = 0.55 + 0.45*pulseReward;
    drawDroplet(sctx, rewardX, midTop, rewardPulseR);
    sctx.restore();
  }

  // event labels
  sctx.font = `400 11px ${'"JetBrains Mono", monospace'}`;
  sctx.fillStyle = COL.inkMuted; sctx.textAlign = 'center';
  sctx.fillText('cue', cueX, y1Top + 2);
  sctx.fillText(state.omittedThisTrial ? 'no reward' : 'reward', rewardX, y1Top + 2);

  /* ---------- BOTTOM PANEL: dopamine trace ---------- */
  const baseY = (y0Bot + 22 + y1Bot) / 2;
  const maxAmp = (y1Bot - (y0Bot+22)) * 0.42;

  // baseline dashed hairline
  sctx.strokeStyle = COL.rule; sctx.lineWidth = 1;
  sctx.setLineDash([4,4]);
  sctx.beginPath(); sctx.moveTo(padL, baseY); sctx.lineTo(w-padR, baseY); sctx.stroke();
  sctx.setLineDash([]);
  sctx.font = `400 10px ${'"JetBrains Mono", monospace'}`;
  sctx.fillStyle = COL.inkMuted; sctx.textAlign = 'right';
  sctx.fillText('baseline', w-padR, baseY - 5);

  const strokeW = 3.4 * lw;

  if(!state.tdMode){
    // --- two-timepoint spikes ---
    // cue spike (blue), reward spike (vermilion) or dip (loss)
    drawSpike(sctx, cueX, baseY, state.dispCue * maxAmp, COL.cue, strokeW);
    const rv = state.dispReward;
    if(rv < -0.001){
      // omission dip below baseline — loss colour, flash on event
      const flash = pulseReward;
      drawSpike(sctx, rewardX, baseY, rv * maxAmp, COL.loss, strokeW + 2*flash*lw);
      if(flash > 0.15){
        sctx.save(); sctx.globalAlpha = 0.25*flash; sctx.fillStyle = COL.loss;
        sctx.fillRect(padL, baseY, plotW, (y1Bot-baseY)); sctx.restore();
      }
    } else {
      drawSpike(sctx, rewardX, baseY, rv * maxAmp, COL.signal, strokeW);
    }
    // δ value tags
    tagDelta(sctx, cueX, baseY, state.dispCue, COL.cue, maxAmp);
    tagDelta(sctx, rewardX, baseY, state.dispReward, rv<-0.001?COL.loss:COL.signal, maxAmp);
  } else {
    // --- TD trace across bins ---
    const x0 = cueX, x1 = rewardX;
    const anyNeg = state.dispDeltas.some(d=>d<-0.001);
    // connecting hairline through the bins
    sctx.strokeStyle = COL.inkMuted; sctx.lineWidth = 1; sctx.globalAlpha = 0.35;
    sctx.beginPath();
    for(let i=0;i<N_BINS;i++){
      const x = lerp(x0, x1, i/(N_BINS-1));
      const y = baseY - state.dispDeltas[i]*maxAmp;
      i===0 ? sctx.moveTo(x,y) : sctx.lineTo(x,y);
    }
    sctx.stroke(); sctx.globalAlpha = 1;
    // per-bin spikes
    for(let i=0;i<N_BINS;i++){
      const x = lerp(x0, x1, i/(N_BINS-1));
      const d = state.dispDeltas[i];
      if(Math.abs(d) < 0.008) continue;
      const c = d<0 ? COL.loss : (i<=Math.floor(N_BINS/2)? COL.cue : COL.signal);
      drawSpike(sctx, x, baseY, d*maxAmp, c, 2.6*lw);
    }
  }

  // baseline "tonic" hint dots at edges
  sctx.fillStyle = COL.inkMuted; sctx.globalAlpha = 0.4;
  sctx.beginPath(); sctx.arc(padL, baseY, 1.6, 0, Math.PI*2); sctx.fill();
  sctx.globalAlpha = 1;
}

function drawDroplet(ctx, x, y, r){
  ctx.beginPath();
  ctx.moveTo(x, y - r*1.3);
  ctx.bezierCurveTo(x + r, y - r*0.2, x + r, y + r*0.7, x, y + r);
  ctx.bezierCurveTo(x - r, y + r*0.7, x - r, y - r*0.2, x, y - r*1.3);
  ctx.closePath(); ctx.fill();
}

function drawSpike(ctx, x, baseY, dyPx, colour, width){
  if(Math.abs(dyPx) < 0.5) return;
  ctx.strokeStyle = colour; ctx.lineWidth = width; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x, baseY); ctx.lineTo(x, baseY - dyPx); ctx.stroke();
  // small rounded cap emphasis
  ctx.fillStyle = colour;
  ctx.beginPath(); ctx.arc(x, baseY - dyPx, width*0.62, 0, Math.PI*2); ctx.fill();
}

function tagDelta(ctx, x, baseY, val, colour, maxAmp){
  if(Math.abs(val) < 0.02) return;
  ctx.font = `500 11px ${'"JetBrains Mono", monospace'}`;
  ctx.fillStyle = colour; ctx.textAlign = 'center';
  const y = baseY - val*maxAmp;
  const label = (val>=0?'+':'') + val.toFixed(2);
  ctx.fillText(label, x, val>=0 ? y - 10 : y + 18);
}

/* ============================================================= *
 *  DRAW — learning curve (rail)
 * ============================================================= */
function drawCurve(){
  const { w, h } = sizeCanvas(curve, cctx);
  cctx.clearRect(0,0,w,h);
  const padL = 30, padR = 12, padT = 12, padB = 18;
  const plotW = w-padL-padR, plotH = h-padT-padB;
  const hist = state.history;
  const nMax = Math.max(ASYMPTOTE_TRIALS, hist.length - 1, 1);

  // frame
  cctx.strokeStyle = COL.rule; cctx.lineWidth = 1;
  cctx.beginPath(); cctx.moveTo(padL, padT); cctx.lineTo(padL, padT+plotH); cctx.lineTo(padL+plotW, padT+plotH); cctx.stroke();

  // gridline at V=R
  cctx.strokeStyle = COL.ruleSoft; cctx.setLineDash([3,3]);
  const yR = padT;
  cctx.beginPath(); cctx.moveTo(padL, yR); cctx.lineTo(padL+plotW, yR); cctx.stroke();
  cctx.setLineDash([]);

  // axis labels
  cctx.font = `400 9px "JetBrains Mono", monospace`;
  cctx.fillStyle = COL.inkMuted; cctx.textAlign = 'right'; cctx.textBaseline = 'middle';
  cctx.fillText(R.toFixed(1), padL-4, yR);
  cctx.fillText('0', padL-4, padT+plotH);
  cctx.textAlign = 'center'; cctx.textBaseline = 'top';
  cctx.fillText('trials', padL+plotW/2, padT+plotH+5);

  // series
  cctx.strokeStyle = COL.cue; cctx.lineWidth = 2*COL.lw; cctx.lineJoin='round';
  cctx.beginPath();
  for(let i=0;i<hist.length;i++){
    const x = padL + plotW * (i/nMax);
    const y = padT + plotH * (1 - clamp(hist[i]/R,0,1.05));
    i===0 ? cctx.moveTo(x,y) : cctx.lineTo(x,y);
  }
  cctx.stroke();

  // head dot
  if(hist.length){
    const i = hist.length-1;
    const x = padL + plotW * (i/nMax);
    const y = padT + plotH * (1 - clamp(hist[i]/R,0,1.05));
    cctx.fillStyle = COL.cue;
    cctx.beginPath(); cctx.arc(x,y,3,0,Math.PI*2); cctx.fill();
  }
}

/* ============================================================= *
 *  Captions
 * ============================================================= */
function captionFor(){
  const t = state.trial, V = state.V;
  if(state.tdMode){
    if(state.omittedThisTrial) return `Reward withheld: a <span class="lossword">negative error</span> appears at reward time, then unlearns backward across the bins.`;
    // find the bin carrying the largest positive error → where the signal currently sits
    let peak = 0, peakVal = 0;
    for(let i=0;i<state.dispDeltas.length;i++){ if(state.dispDeltas[i] > peakVal){ peakVal = state.dispDeltas[i]; peak = i; } }
    const frac = peak/(N_BINS-1);
    if(t === 0) return `<b>Full TD trace.</b> ${N_BINS} time-bins between <span class="cueword">cue</span> and reward. Run trials to watch the error walk backward.`;
    if(frac > 0.6) return `The prediction error still sits near the <b>reward</b> (bin ${peak+1}/${N_BINS}). Keep running — watch it step <em>backward</em>.`;
    if(frac > 0.15) return `The error is <em>propagating backward</em>, now at bin ${peak+1}/${N_BINS} — walking from reward toward the <span class="cueword">cue</span>, one bin per trial.`;
    return `The error has reached the <span class="cueword">cue</span>. The predictive signal has fully migrated to the earliest reliable predictor.`;
  }
  if(state.omittedThisTrial){
    return `Predicted reward <span class="lossword">omitted</span>: the signal fires at the <span class="cueword">cue</span>, then <span class="lossword">dips below baseline</span> at reward time — the system registers "less than expected".`;
  }
  if(t === 0) return `Ready. The <span class="cueword">cue</span> predicts nothing yet (V = 0). Run a trial to see an <b>unpredicted reward</b>.`;
  if(V < 0.15) return `<b>Unpredicted reward</b>: a full dopamine <b>spike at reward</b>, nothing at the <span class="cueword">cue</span>. δ = actual − predicted is large.`;
  if(V < 0.75) return `Learning… the signal is <em>migrating</em>: growing at the <span class="cueword">cue</span>, shrinking at the <b>reward</b> as prediction (V = ${V.toFixed(2)}) catches up.`;
  return `<b>Reward fully predicted</b>: the signal now fires at the <span class="cueword">cue</span> (V = ${V.toFixed(2)}); the reward itself is expected, so δ there ≈ 0.`;
}
function setCaption(html){ el.caption.innerHTML = html; }

/* ============================================================= *
 *  Readouts
 * ============================================================= */
function syncReadouts(){
  el.trialCount.textContent = state.trial;
  el.vVal.textContent = state.V.toFixed(2);
  drawCurve();
}

/* ============================================================= *
 *  Actions
 * ============================================================= */
function doRunTrial(){
  runTrial();
  setCaption(captionFor());
}

function doReset(){
  stopAuto();
  state.trial = 0; state.V = 0; state.history = [0];
  state.dispCue = 0; state.dispReward = 0; state.targetCue = 0; state.targetReward = 0;
  state.omittedThisTrial = false;
  state.W = new Array(N_BINS).fill(0);
  state.dispDeltas = new Array(N_BINS).fill(0);
  state.targetDeltas = new Array(N_BINS).fill(0);
  state.anim = null;
  setCondition('learning', false);
  syncReadouts();
  setCaption(captionFor());
  requestAnimationFrame(()=>requestAnimationFrame(()=>drawScope(0,0)));
}

function setCondition(cond, doAction){
  state.condition = cond;
  el.segBtns.forEach(b=>{
    const on = b.dataset.cond === cond;
    b.classList.toggle('on', on);
    b.setAttribute('aria-pressed', on ? 'true':'false');
  });
  if(doAction){
    if(cond === 'learned'){ snapToLearned(); setCaption(captionFor()); }
    else if(cond === 'omission'){
      // show the dip immediately if a value has been learned
      if(state.V > 0.05){ doRunTrial(); }
      else { setCaption(`Withholding reward. Learn the <span class="cueword">cue</span> first (try <b>Learned</b>), then omit to see the <span class="lossword">dip</span>.`); }
    } else {
      setCaption(captionFor());
    }
  }
}

/* Auto-run */
function startAuto(){
  if(state.autorun) return;
  state.autorun = true;
  el.auto.setAttribute('aria-pressed','true');
  el.auto.innerHTML = '⏸ Pause';
  const interval = reducedMotion ? 650 : 1000;
  state.autorunTimer = setInterval(()=>{
    doRunTrial();
  }, interval);
}
function stopAuto(){
  if(!state.autorun) return;
  state.autorun = false;
  el.auto.setAttribute('aria-pressed','false');
  el.auto.innerHTML = '▶ Auto-run';
  clearInterval(state.autorunTimer); state.autorunTimer = null;
}
function toggleAuto(){ state.autorun ? stopAuto() : startAuto(); }

/* ============================================================= *
 *  Guided "Reproduce Schultz's figure"
 * ============================================================= */
function sleep(ms){ return new Promise(r=>setTimeout(r, reducedMotion?Math.min(ms,300):ms)); }

async function reproduceSchultz(){
  if(state.guided) return;
  state.guided = true;
  stopAuto();
  setControlsDisabled(true);
  el.schultz.textContent = '▸ Running demo…';

  // fresh start
  doReset();
  await sleep(500);

  // STATE 1 — unpredicted reward (trial 1)
  setCondition('learning', false);
  doRunTrial();
  setCaption(`<b>1 · Unpredicted reward.</b> Full dopamine <b>spike at the reward</b>, nothing at the <span class="cueword">cue</span>. The reward is a complete surprise.`);
  await sleep(2600);

  // learn to asymptote, trial by trial (watch the migration)
  const step = reducedMotion ? 0 : 620;
  for(let i=0;i<ASYMPTOTE_TRIALS-1;i++){
    doRunTrial();
    setCaption(`Learning… the signal <em>migrates</em> left toward the <span class="cueword">cue</span> (V = ${state.V.toFixed(2)}).`);
    await sleep(step);
  }
  await sleep(600);

  // STATE 2 — predicted reward
  setCaption(`<b>2 · Predicted reward.</b> The signal now fires at the <span class="cueword">cue</span>; the reward is fully predicted, so δ there ≈ 0.`);
  await sleep(2800);

  // STATE 3 — omission
  setCondition('omission', false);
  doRunTrial();
  setCaption(`<b>3 · Predicted but omitted.</b> Spike at the <span class="cueword">cue</span>, then a <span class="lossword">dip below baseline</span> at reward time — the signature of a negative prediction error.`);
  await sleep(2600);

  el.schultz.innerHTML = '▸ Reproduce Schultz\'s figure';
  setControlsDisabled(false);
  state.guided = false;
}

function setControlsDisabled(dis){
  [el.run1, el.auto, el.reset, el.tdmode, ...el.segBtns].forEach(b=>{ b.disabled = dis; });
  el.schultz.disabled = false;
}

/* ============================================================= *
 *  Mode toggle
 * ============================================================= */
function setMode(mode){
  state.mode = mode;
  document.body.classList.toggle('project', mode === 'project');
  el.modeBtns.forEach(b=>b.classList.toggle('on', b.dataset.mode === mode));
  try{ localStorage.setItem('rpe-mode', mode); }catch(e){}
  refreshColours();
  // re-measure after layout settles (font-size change alters canvas box)
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ drawScope(0,0); drawCurve(); }));
}

/* ============================================================= *
 *  Events
 * ============================================================= */
el.run1.addEventListener('click', ()=>{ stopAuto(); doRunTrial(); });
el.auto.addEventListener('click', toggleAuto);
el.reset.addEventListener('click', doReset);
el.schultz.addEventListener('click', reproduceSchultz);

el.alpha.addEventListener('input', e=>{
  state.alpha = parseFloat(e.target.value);
  el.alphaVal.textContent = state.alpha.toFixed(2);
});

el.tdmode.addEventListener('change', e=>{
  state.tdMode = e.target.checked;
  doReset();
  setCaption(state.tdMode
    ? `<b>Full TD trace.</b> The delay is split into ${N_BINS} time-bins. Watch the error propagate <em>backward</em>, bin by bin, from reward toward the <span class="cueword">cue</span> across trials.`
    : captionFor());
});

el.segBtns.forEach(b=>{
  b.addEventListener('click', ()=>{ stopAuto(); setCondition(b.dataset.cond, true); });
});
el.modeBtns.forEach(b=>{
  b.addEventListener('click', ()=>setMode(b.dataset.mode));
});

// keyboard: space = run 1 trial (when not on a control)
window.addEventListener('keydown', e=>{
  if(e.code === 'Space' && !['INPUT','BUTTON','TEXTAREA'].includes(document.activeElement.tagName)){
    e.preventDefault(); stopAuto(); doRunTrial();
  }
});

// resize (debounced)
let rzT;
window.addEventListener('resize', ()=>{
  clearTimeout(rzT);
  rzT = setTimeout(()=>{ drawScope(0,0); drawCurve(); }, 120);
});

/* ============================================================= *
 *  Init
 * ============================================================= */
function init(){
  let saved = 'project';
  try{ saved = localStorage.getItem('rpe-mode') || 'project'; }catch(e){}
  state.mode = saved;
  document.body.classList.toggle('project', saved === 'project');
  el.modeBtns.forEach(b=>b.classList.toggle('on', b.dataset.mode === saved));
  refreshColours();
  syncReadouts();
  setCaption(captionFor());
  // double-rAF before first draw so canvases have real dimensions
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ drawScope(0,0); drawCurve(); }));
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else { init(); }

})();
</script>
</body>
</html>
